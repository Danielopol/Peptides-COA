name: Deploy web to Vercel

# Builds the Flutter web app in CI (free GitHub-hosted runner, with the Flutter
# SDK cached between runs) and ships the prebuilt static output to Vercel via the
# CLI. This keeps the heavy dart2js compile OFF Vercel's build meter — Vercel only
# receives finished static files, so its build CPU usage drops to ~zero.
#
# Runs only when something under app/ changes (backend / docs commits don't
# rebuild the frontend). Trigger a deploy by hand from the Actions tab with
# "Run workflow".

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# Never run two deploys at once; cancel an in-progress one if a newer commit lands.
concurrency:
  group: vercel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter (SDK cached between runs)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # App is served under /app/ (the static marketing landing owns /).
      - name: Build web (release, cheaper compile, base /app/)
        working-directory: app
        run: |
          flutter build web --release \
            --base-href=/app/ \
            --dart2js-optimization=O2 \
            --no-source-maps \
            --no-tree-shake-icons \
            --dart-define=API_BASE_URL=https://peptides-coa-production.up.railway.app \
            --dart-define=USE_MOCK=false

      # Assemble at the REPO ROOT: the deploy step runs from the root, and
      # `--prebuilt` reads .vercel/output relative to the current dir. (Project
      # lookup separately applies the "app" Root Directory — see the deploy step.)
      # Layout: static landing + SEO files at /, Flutter app under /app/.
      - name: Assemble Vercel prebuilt output (Build Output API v3)
        run: |
          rm -rf .vercel/output
          mkdir -p .vercel/output/static/app
          cp -r app/build/web/. .vercel/output/static/app/
          cp web-landing/index.html   .vercel/output/static/index.html
          cp web-landing/robots.txt   .vercel/output/static/robots.txt
          cp web-landing/sitemap.xml  .vercel/output/static/sitemap.xml
          cp app/assets/logo.png      .vercel/output/static/logo.png
          cp app/web/favicon.png      .vercel/output/static/favicon.png
          echo '{"version":3}' > .vercel/output/config.json

      # Run from the repo ROOT, not app/. The Vercel project's Root Directory is
      # "app", and the CLI appends it to the working dir — running inside app/
      # resolves to app/app (the error we hit). From the root it resolves to app,
      # and the prebuilt output is read from app/.vercel/output.
      - name: Deploy prebuilt to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm i -g vercel@latest
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
