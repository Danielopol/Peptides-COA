<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Pep Trust scans a peptide Certificate of Analysis (COA) and scores how authentic and complete it is — cross-checking the lab, molecular weights and forgery markers, with plain-language red flags. First scan free.">
  <meta name="keywords" content="peptide COA, certificate of analysis, COA verification, peptide purity, research peptides, HPLC, mass spectrometry, fake COA">
  <link rel="canonical" href="https://www.peptidestrust.com/">
  <meta name="robots" content="index, follow">

  <!-- Open Graph (link previews) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Pep Trust">
  <meta property="og:title" content="Pep Trust — Verify a Peptide COA">
  <meta property="og:description" content="Scan a peptide Certificate of Analysis and get an authenticity + completeness score, with plain-language red flags. First scan free.">
  <meta property="og:url" content="https://www.peptidestrust.com/">
  <meta property="og:image" content="https://www.peptidestrust.com/icons/Icon-512.png">

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Pep Trust — Verify a Peptide COA">
  <meta name="twitter:description" content="Scan a peptide COA for authenticity and completeness, with plain-language red flags. First scan free.">
  <meta name="twitter:image" content="https://www.peptidestrust.com/icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Pep Trust">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Pep Trust — Verify a Peptide COA (Certificate of Analysis)</title>
  <link rel="manifest" href="manifest.json">

  <!-- Passkeys Web SDK (corbado) — required by the passkeys_web plugin pulled in
       transitively via supabase_flutter. Must load before Flutter boots so the
       PasskeyAuthenticator global exists when the plugin registers; without it
       PasskeyAuthenticator.init() throws and the app renders a blank screen.
       Self-hosted (see web/bundle.js) to avoid GitHub's octet-stream MIME. -->
  <script src="bundle.js"></script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>

  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.va.q = window.va.q || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
